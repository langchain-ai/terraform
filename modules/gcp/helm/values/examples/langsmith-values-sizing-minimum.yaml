        memory: "384Mi"

# -- In-cluster data services (Tier 1 only) -----------------------------------
# These apply when using in-cluster postgres, redis, and clickhouse.
# If pointing at managed services (Cloud SQL, Memorystore, ClickHouse Cloud),
# these blocks are ignored — the StatefulSets won't be created.
#
# GCP storage class: premium-rwo (zonal SSD) is the default for StatefulSets.
# ClickHouse is the one component that actually uses its resources.
# Don't go below this or queries will time out.

postgres:
  statefulSet:
    resources:
      requests:
        cpu: "50m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

redis:
  statefulSet:
    resources:
      requests:
        cpu: "25m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"

clickhouse:
  statefulSet:
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"
