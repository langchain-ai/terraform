# ============================================================================
# ABSOLUTE MINIMUM — NOT FOR ANY REAL WORKLOAD
#
# This profile exists to keep LangSmith alive at the lowest possible cost.
# Single replica, rock-bottom resource requests sized from actual kubectl-top
# measurements on an idle cluster. The goal is to fit everything on a single
# small node (e.g. e2-standard-4 — 4 vCPU, 16 Gi on GKE).
#
# WILL break under any meaningful traffic. OOM kills, timeouts, and degraded
# UX are expected and acceptable. Do not file bugs against this profile.
#
# Use cases: cost parking, weekend standby, CI smoke tests, demos with a
# single user clicking around.
#
# For actual dev work: use langsmith-values-sizing-dev.yaml
# For production:      use langsmith-values-sizing-production.yaml
# ============================================================================

# -- Application components ----------------------------------------------------

backend:
  e2eTest:
    enabled: false
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "576Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

frontend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

platformBackend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "25m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

playground:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "25m"
        memory: "384Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"

queue:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "768Mi"
      limits:
        cpu: "1"
        memory: "1536Mi"

ingestQueue:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "25m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

aceBackend:
  deployment:
    replicas: 1
    resources:
