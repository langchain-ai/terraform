# Insights — standalone path (chart v0.15+).
#
# Uses insights.enabled (standalone) rather than config.insights.enabled (legacy).
# Does NOT require enable_deployments = true.
# Do not combine with langsmith-values-insights.yaml (legacy config.insights path).
#
# This file is auto-generated by init-values.sh when enable_standalone_insights = true
# in terraform.tfvars. External postgres and redis are wired to the existing
# Cloud SQL and Memorystore instances provisioned by the infra pass.
#
# Note: standalone Insights does not replace the ClickHouse dependency — ClickHouse
# is still required for the analytics backend. Configure via the existing
# clickhouse_source / langsmith-values-insights.yaml flow.
#
# Prerequisites:
#   - chart >= 0.15.0
#   - Insights entitlement in your LangSmith license
#   - An 'insights' database on Cloud SQL — provisioned automatically by terraform apply
#   - TF_VAR_langsmith_insights_encryption_key set (see infra/scripts/setup-env.sh)
#     (shared with the legacy enable_insights path — same key, same data)
#
# Enable via: enable_standalone_insights = true in terraform.tfvars
# encryptionKey is written by init-values.sh into helm/values/values-overrides.yaml
# as a top-level `insights.encryptionKey` (gitignored; mirrors the fleet.encryptionKey convention).

# Disables the legacy config.insights path — overrides langsmith-values-insights.yaml
# if both files are loaded in the same helm command.
config:
  insights:
    enabled: false

insights:
  enabled: true
  namePrefix: "standalone-insights"
  # encryptionKey lives in helm/values/values-overrides.yaml — do NOT add it here.
  # Shared with the legacy config.insights path — do not change once data exists.

  # Resources required — the langsmith-quota ResourceQuota in this namespace
  # rejects any pod that doesn't specify cpu/memory limits and requests.
  # Sizing mirrors the legacy `config.insights.agent.resources` defaults
  # (cpu: 2/4, memoryMb: 4096/8192) split between api-server and queue.
  apiServer:
    deployment:
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi

  queue:
    deployment:
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi

  postgres:
    external:
      enabled: true
      # Secret created by Terraform (infra/main.tf: kubernetes_secret.standalone_insights_postgres).
      # Contains key: postgres_connection_url = postgresql://<user>:<pass>@<host>:5432/insights?sslmode=require
      existingSecretName: "langsmith-insights-postgres"

  redis:
    external:
      enabled: true
      # Secret created by Terraform (infra/main.tf: kubernetes_secret.standalone_insights_redis).
      # Contains key: redis_connection_url = redis://<host>:<port>
      existingSecretName: "langsmith-insights-redis"
