# Agent Builder — visual agent building UI (requires Deployments).
#
# init-values.sh copies this to ../langsmith-values-agent-builder.yaml when you choose
# a product tier that includes Agent Builder.
# Manual: cp examples/langsmith-values-agent-builder.yaml ../langsmith-values-agent-builder.yaml
#
# Prerequisites:
#   - Agent Builder / LangGraph Platform entitlement in your LangSmith license
#   - Sufficient cluster resources (Agent Builder runs additional workloads)

config:
  agentBuilder:
    enabled: true
    # encryptionKey must be set in values-overrides.yaml or via --set on each deploy.
    # Generate a Fernet key:
    #   python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    # Store it safely (Secret Manager, 1Password, etc.) — rotating this key requires
    # re-encrypting all existing Agent Builder configurations.
    # encryptionKey: "YOUR_AGENT_BUILDER_FERNET_KEY"

backend:
  agentBootstrap:
    # Required: runs the post-install/post-upgrade job that creates the
    # langsmith-agent-builder-config ConfigMap and registers Agent Builder as an
    # LGP deployment. Without this the Agent Builder nav item will not appear in the UI.
    enabled: true

agentBuilderToolServer:
  enabled: true

agentBuilderTriggerServer:
  enabled: true
