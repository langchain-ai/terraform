# Deployments (LangGraph Platform) — enables the Deployments UI, listener, and operator.
#
# init-values.sh copies this to ../langsmith-values-agent-deploys.yaml when you choose
# a product tier that includes Deployments.
# Manual: cp examples/langsmith-values-agent-deploys.yaml ../langsmith-values-agent-deploys.yaml
#
# Prerequisites:
#   - LangGraph Platform entitlement in your LangSmith license
#   - KEDA installed (var.enable_langsmith_deployment = true in terraform.tfvars)

config:
  deployment:
    # Enables the Deployments nav item in the UI. Also requires config.hostname to be
    # set in values-overrides.yaml — find the Envoy Gateway IP with:
    #   kubectl get gateway -n langsmith -o jsonpath='{.items[0].status.addresses[0].value}'
    enabled: true
    # Set to true if TLS is configured (tls_certificate_source = "letsencrypt" or "existing").
    # false = HTTP-only (tls_certificate_source = "none"). The operator uses this to
    # build agent deployment endpoint URLs — wrong value keeps deployments in DEPLOYING.
    tlsEnabled: false

# Resource sizing for shared components (backend, frontend, playground, aceBackend)
# is handled by the sizing files (langsmith-values-sizing-ha.yaml or langsmith-values-sizing-light.yaml).
# Do not set replicaCount or resources for those components here — it silently
# overrides HPA/autoscaling settings from the sizing file because this file
# is loaded after them in Helm's values merge order.

hostBackend:
  enabled: true
  resources:
    requests:
      cpu: "500m"
      memory: "512Mi"
    limits:
      cpu: "2"
      memory: "2Gi"
  autoscaling:
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70

listener:
  enabled: true
  resources:
    requests:
      cpu: "1000m"
      memory: "2Gi"
    limits:
      cpu: "2"
      memory: "4Gi"

operator:
  enabled: true
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  # Deployment template for operator-spawned agent pods.
  # Workload Identity: agent pods run as langsmith-ksa. That ServiceAccount must have
  # the iam.gke.io/gcp-service-account annotation — init-values.sh writes it alongside
  # the other component service accounts.
  templates:
    deployment: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ${name}
        namespace: ${namespace}
      spec:
        replicas: ${replicas}
        revisionHistoryLimit: 10
        selector:
          matchLabels:
            app: ${name}
        template:
          metadata:
            labels:
              app: ${name}
          spec:
            enableServiceLinks: false
            serviceAccountName: langsmith-ksa
            containers:
            - name: api-server
              image: ${image}
              ports:
              - name: api-server
                containerPort: 8000
                protocol: TCP
              livenessProbe:
                httpGet:
                  path: /ok
                  port: 8000
                periodSeconds: 15
                timeoutSeconds: 5
                failureThreshold: 6
              readinessProbe:
                httpGet:
                  path: /ok
                  port: 8000
                periodSeconds: 15
                timeoutSeconds: 5
                failureThreshold: 6
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
