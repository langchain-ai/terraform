# -- In-cluster data services (Tier 1 only) -----------------------------------
# These apply when using in-cluster postgres, redis, and clickhouse.
# If pointing at managed services (Cloud SQL, Memorystore, ClickHouse Cloud),
# these blocks are ignored — the StatefulSets won't be created.
#
# GCP storage class: premium-rwo (zonal SSD) is the default for StatefulSets.
# Chart default for ClickHouse is 3.5 CPU / 12Gi — wildly oversized for dev.

postgres:
  statefulSet:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "1"
        memory: "512Mi"

redis:
  statefulSet:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

clickhouse:
  statefulSet:
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1.5Gi"
