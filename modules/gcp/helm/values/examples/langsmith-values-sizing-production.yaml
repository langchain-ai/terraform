# -- In-cluster ClickHouse (dev/POC only — production should use external) -----
# GCP storage class: premium-rwo (zonal SSD PD) — chart default for StatefulSets.
# For production, use LangChain Managed ClickHouse instead of in-cluster.

clickhouse:
  statefulSet:
    resources:
      requests:
        cpu: "2"
        memory: "8Gi"
      limits:
        cpu: "4"
        memory: "16Gi"
