# Polly — standalone path (chart v0.15+).
#
# Uses polly.enabled (standalone) rather than config.polly.enabled (legacy).
# Does NOT require enable_deployments = true.
# Do not combine with langsmith-values-polly.yaml (legacy config.polly path).
#
# This file is auto-generated by init-values.sh when enable_standalone_polly = true
# in terraform.tfvars. External postgres and redis are wired to the existing
# Cloud SQL and Memorystore instances provisioned by the infra pass.
#
# Prerequisites:
#   - chart >= 0.15.0
#   - Polly entitlement in your LangSmith license
#   - A 'polly' database on Cloud SQL — provisioned automatically by terraform apply
#   - TF_VAR_langsmith_polly_encryption_key set (see infra/scripts/setup-env.sh)
#     (shared with the legacy enable_polly path — same key, same data)
#
# Enable via: enable_standalone_polly = true in terraform.tfvars
# encryptionKey is written by init-values.sh into helm/values/values-overrides.yaml
# as a top-level `polly.encryptionKey` (gitignored; mirrors the fleet.encryptionKey convention).

# Disables the legacy config.polly path — overrides langsmith-values-polly.yaml
# if both files are loaded in the same helm command.
config:
  polly:
    enabled: false

polly:
  enabled: true
  namePrefix: "standalone-polly"
  # enableTracing defaults to true in v0.15 — Polly traces back to LangSmith.
  enableTracing: true
  # encryptionKey lives in helm/values/values-overrides.yaml — do NOT add it here.
  # Shared with the legacy config.polly path — do not change once data exists.

  # Resources required — the langsmith-quota ResourceQuota in this namespace
  # rejects any pod that doesn't specify cpu/memory limits and requests.
  # Sizing mirrors the legacy `config.polly.agent.resources` defaults
  # (cpu: 2/4, memoryMb: 4096/8192) split between api-server and queue.
  apiServer:
    deployment:
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi

  queue:
    deployment:
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi

  postgres:
    external:
      enabled: true
      # Secret created by Terraform (infra/main.tf: kubernetes_secret.standalone_polly_postgres).
      # Contains key: postgres_connection_url = postgresql://<user>:<pass>@<host>:5432/polly?sslmode=require
      existingSecretName: "langsmith-polly-postgres"

  redis:
    external:
      enabled: true
      # Secret created by Terraform (infra/main.tf: kubernetes_secret.standalone_polly_redis).
      # Contains key: redis_connection_url = redis://<host>:<port>
      existingSecretName: "langsmith-polly-redis"
