# Polly — AI-powered evaluation and monitoring.
# Requires config.deployment.enabled = true (LangGraph Platform).
# Enable via: enable_polly = true in terraform.tfvars
config:
  polly:
    enabled: true
    agent:
      resources:
        cpu: 2
        cpuLimit: 4
        memoryMb: 4096
        memoryLimitMb: 8192
        minScale: 1
        maxScale: 5
