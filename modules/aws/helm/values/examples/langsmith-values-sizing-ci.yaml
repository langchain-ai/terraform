# CI / test sizing — minimal resource footprint for ephemeral environments.
#
# Single replicas, tight limits, no autoscaling. Suitable for CI pipelines,
# integration-test clusters (k3d / kind / EKS dev), and short-lived POCs.
#
# This file is a SIZING overlay — it sets replicas and resource requests/limits
# only. Combine it with:
#   langsmith-values.yaml         — base AWS config (ingress, auth, ESO)
#   langsmith-values-{env}.yaml   — generated by init-values.sh (hostname, IRSA, bucket)
#
# If running ALL services in-cluster (Tier 1), also disable external postgres
# and redis by removing the postgres.external / redis.external blocks from
# langsmith-values.yaml or overriding them here.
#
# deploy.sh picks this up automatically when present.
#
# NOTE: Uses deployment.resources / deployment.replicas nesting to match the
# current LangSmith chart schema (aligned with GCP and Azure values).

# -- Application components ----------------------------------------------------

backend:
  e2eTest:
    enabled: false
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

frontend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

platformBackend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

playground:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "384Mi"

hostBackend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

listener:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

queue:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

ingestQueue:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

aceBackend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# -- In-cluster data services (Tier 1 only) -----------------------------------
# These apply when using in-cluster postgres, redis, and clickhouse.
# If you're pointing at managed services (RDS, ElastiCache, ClickHouse Cloud),
# these blocks are ignored — the StatefulSets won't be created.

postgres:
  statefulSet:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "1"
        memory: "512Mi"

redis:
  statefulSet:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

clickhouse:
  statefulSet:
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1.5Gi"
