# ============================================================================
# ABSOLUTE MINIMUM — NOT FOR ANY REAL WORKLOAD
#
# This profile exists to keep LangSmith alive at the lowest possible cost.
# Single replica, rock-bottom resource requests sized from actual kubectl-top
# measurements on an idle cluster. The goal is to fit everything
# on a single small node (e.g. m5.xlarge — 4 vCPU, 16 Gi).
#
# WILL break under any meaningful traffic. OOM kills, timeouts, and degraded
# UX are expected and acceptable. Do not file bugs against this profile.
#
# Use cases: cost parking, weekend standby, CI smoke tests, demos with a
# single user clicking around.
#
# For actual dev work: use langsmith-values-sizing-dev.yaml
# For production:      use langsmith-values-sizing-production.yaml
# ============================================================================

# -- Application components ----------------------------------------------------

backend:
  e2eTest:
    enabled: false
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "576Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

frontend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "10m"
        memory: "32Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

platformBackend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "25m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

playground:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "25m"
        memory: "384Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"

queue:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "768Mi"
      limits:
        cpu: "1"
        memory: "1536Mi"

ingestQueue:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "25m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

aceBackend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "25m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

# -- Deployments feature components --------------------------------------------

hostBackend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "384Mi"
      limits:
        cpu: "500m"
        memory: "768Mi"
  autoscaling:
    hpa:
      minReplicas: 1
      maxReplicas: 1

listener:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "250m"
        memory: "768Mi"
      limits:
        cpu: "1"
        memory: "1536Mi"

operator:
  kedaEnabled: false
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "512Mi"

# -- Agent Builder infrastructure ----------------------------------------------

fleetToolServer:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "500m"
        memory: "768Mi"
      limits:
        cpu: "1"
        memory: "1536Mi"

fleetTriggerServer:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "250m"
        memory: "384Mi"

# -- Operator-managed agent resources ------------------------------------------
# Removed: chart 0.15.1+ dropped the bundled operator-managed agent path and its
# validator hard-fails on the presence of config.polly / config.insights (even
# when only sizing their nested agent.resources). Standalone Fleet/Polly/Insights
# are sized via the top-level apiServer/queue resources in their own overlays
# (langsmith-values-fleet.yaml, -standalone-polly.yaml, -standalone-insights.yaml).

# -- In-cluster data services (Tier 1 only) -----------------------------------
# ClickHouse is the one component that actually uses its resources.
# Don't go below this or queries will time out.

postgres:
  statefulSet:
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

redis:
  statefulSet:
    resources:
      requests:
        cpu: "100m"
        memory: "64Mi"
      limits:
        cpu: "200m"
        memory: "128Mi"

clickhouse:
  statefulSet:
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
