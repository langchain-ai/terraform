# Insights — ClickHouse-backed analytics (requires external ClickHouse).
#
# init-values.sh copies this to ../langsmith-values-insights.yaml when you choose
# a product tier that includes Insights (tier 4). You'll be prompted for ClickHouse connection details.
# Manual: cp examples/langsmith-values-insights.yaml ../langsmith-values-insights.yaml
#
# Prerequisites:
#   - ClickHouse instance (AWS Marketplace, LangChain managed, or self-hosted)
#   - ClickHouse must be reachable from the EKS cluster

config:
  insights:
    enabled: true
    # encryptionKey is pulled from SSM via ESO — do not set it here.
    # Required SSM parameter: /langsmith/{prefix}-{env}/insights-encryption-key
    # Generate: python3 -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
    # Store:    aws ssm put-parameter --name "/langsmith/{prefix}-{env}/insights-encryption-key" \
    #             --value "<key>" --type SecureString
    # deploy.sh adds this key to the langsmith-config ExternalSecret automatically.

clickhouse:
  external:
    enabled: true
    host: ""          # ClickHouse hostname or endpoint
    port: "8123"      # HTTP port (default 8123); use 8443 for HTTPS
    database: "default"
    user: "default"
    # tls: true       # Uncomment if using HTTPS/TLS
    #
    # Option A (recommended): Store credentials in a K8s Secret and reference it.
    # The chart reads each field by its *SecretKey name (clickhouse_password, etc.).
    #   kubectl create secret generic langsmith-clickhouse -n langsmith \
    #     --from-literal=clickhouse_host=<host> \
    #     --from-literal=clickhouse_port=8123 \
    #     --from-literal=clickhouse_user=default \
    #     --from-literal=clickhouse_password=<password> \
    #     --from-literal=clickhouse_db=default \
    #     --from-literal=clickhouse_tls=false
    existingSecretName: "langsmith-clickhouse"
    #
    # Option B: Inline password (not recommended — visible in Helm release metadata):
    # password: ""
