# Light sizing — reduced resource requests for POCs, trials, and staging.
# Single replicas, no autoscaling. For production, use langsmith-values-sizing-ha.yaml.
#
# init-values.sh copies this to ../langsmith-values-sizing-light.yaml when you choose light sizing.
# Manual: cp examples/langsmith-values-sizing-light.yaml ../langsmith-values-sizing-light.yaml

platformBackend:
  deployment:
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

backend:
  deployment:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

ingestQueue:
  deployment:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

queue:
  deployment:
    resources:
      requests:
        cpu: "250m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "2Gi"

frontend:
  deployment:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

playground:
  deployment:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

aceBackend:
  deployment:
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
