# HA sizing — multi-replica deployments and autoscaling for production workloads.
# For smaller POC/test deployments, use langsmith-values-sizing-light.yaml instead.
#
# init-values.sh copies this to ../langsmith-values-sizing-ha.yaml when you choose HA sizing.
# Manual: cp examples/langsmith-values-sizing-ha.yaml ../langsmith-values-sizing-ha.yaml

# -- Resource sizing and autoscaling ------------------------------------------
# Tune to your workload. These are reasonable starting points for a medium
# production deployment. Monitor actual usage with:
#   kubectl top pods -n langsmith

platformBackend:
  deployment:
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"
  autoscaling:
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 50
      targetMemoryUtilizationPercentage: 80

backend:
  deployment:
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"
  autoscaling:
    hpa:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilizationPercentage: 50
      targetMemoryUtilizationPercentage: 80

