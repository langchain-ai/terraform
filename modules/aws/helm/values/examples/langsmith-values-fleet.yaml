# Fleet — v0.15 standalone counterpart to Agent Builder (chart v0.15+).
#
# Uses the top-level fleet.enabled (standalone) path.
# REQUIRES enable_deployments = true: the Fleet chat UI resolves OAuth provider/
# token connections via host-backend, which is only deployed with Deployments.
# Without it the UI 500s on /v1/platform/fleet/providers/.../connection.
# Do not combine with langsmith-values-agent-builder.yaml (legacy config.agentBuilder path).
#
# This file is auto-generated by init-values.sh when enable_fleet = true in
# terraform.tfvars. External postgres and redis are wired to the existing RDS and
# ElastiCache instances provisioned by the infra pass, via K8s Secrets created by
# Terraform (infra/main.tf):
#   - langsmith-fleet-postgres  (key: postgres_connection_url → langsmith_fleet DB)
#   - langsmith-fleet-redis     (key: redis_connection_url    → ElastiCache DB index /1)
#
# Prerequisites:
#   - chart >= 0.15.0
#   - Agent Builder / Fleet entitlement in your LangSmith license
#   - enable_deployments = true (host-backend serves Fleet's OAuth provider/token endpoints)
#   - postgres_source = "external" and redis_source = "external" in terraform.tfvars
#   - A 'langsmith_fleet' database on RDS — created automatically by terraform apply
#   - TF_VAR_langsmith_agent_builder_encryption_key set (see infra/scripts/setup-env.sh)
#     (shared with the legacy enable_agent_builder path — same key, same data)
#
# Enable via: enable_fleet = true in terraform.tfvars
# encryptionKey is injected automatically by init-values.sh.

# Disables the legacy config.agentBuilder path — overrides langsmith-values-agent-builder.yaml
# if both files are loaded in the same helm command.
config:
  agentBuilder:
    enabled: false

fleet:
  enabled: true
  namePrefix: "standalone-fleet"
  # encryptionKey is written by init-values.sh into langsmith-values-overrides.yaml
  # from TF_VAR_langsmith_agent_builder_encryption_key (shared with the legacy
  # config.agentBuilder path). Do NOT set it here — do not change once data exists.
  # encryptionKey: ""

  # Explicit resources — a strict ResourceQuota (regulated/production namespaces)
  # rejects any pod that doesn't specify cpu/memory requests and limits
  # (migration issue #7). The chart defaults these standalone blocks to {}.
  apiServer:
    deployment:
      resources:
        requests:
          cpu: "500m"
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 4Gi
    autoscaling:
      enabled: true
      minReplicas: 1
      maxReplicas: 5
      targetCPUUtilizationPercentage: 70

  queue:
    enabled: true
    deployment:
      resources:
        requests:
          cpu: "500m"
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 4Gi

  postgres:
    external:
      enabled: true
      # Secret created by Terraform (infra/main.tf: kubernetes_secret.fleet_postgres).
      # Contains key: postgres_connection_url = postgresql://<user>:<pass>@<host>:5432/langsmith_fleet?sslmode=require
      existingSecretName: "langsmith-fleet-postgres"

  redis:
    external:
      enabled: true
      # Secret created by Terraform (infra/main.tf: kubernetes_secret.fleet_redis).
      # Contains key: redis_connection_url = rediss://:<token>@<host>:6379/1
      existingSecretName: "langsmith-fleet-redis"

# fleetToolServer / fleetTriggerServer are separate top-level Deployments. Chart
# v0.15 renamed them from agentBuilderToolServer / agentBuilderTriggerServer.
# Both default to enabled: true. IRSA serviceAccount.annotations are injected by
# init-values.sh into langsmith-values-overrides.yaml.
fleetToolServer:
  enabled: true
  # Migration issue #13: the 0.15.x fleet-tool-server image CPU-pegs on startup
  # (LANGGRAPH_DEPLOYMENT_URL sync/poll loop) and CrashLoopBackOffs on a 1-CPU
  # limit because uvicorn can't bind port 1989 within the default probe window.
  # Give it >= 2 CPU and relax the startup probe; CPU settles to < 20m afterward.
  deployment:
    resources:
      requests:
        cpu: "1"
        memory: 1Gi
      limits:
        cpu: "2500m"
        memory: 3Gi
    startupProbe:
      httpGet:
        path: /health
        port: 1989
      failureThreshold: 30
      periodSeconds: 5
      timeoutSeconds: 5

fleetTriggerServer:
  # Currently only supports a single replica (chart-enforced) to prevent duplicate
  # trigger executions — do not set a replica count here.
  enabled: true
