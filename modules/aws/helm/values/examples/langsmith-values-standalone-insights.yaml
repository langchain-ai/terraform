# Insights — standalone path (chart v0.15+).
#
# Uses the top-level insights.enabled (standalone) path rather than
# config.insights.enabled (legacy). Does NOT require enable_deployments = true.
# Do not combine with langsmith-values-insights.yaml (legacy config.insights path).
#
# This file is auto-generated by init-values.sh when enable_standalone_insights = true
# in terraform.tfvars. External postgres and redis are wired to the existing RDS and
# ElastiCache instances provisioned by the infra pass, via K8s Secrets created by
# Terraform (infra/main.tf):
#   - langsmith-insights-postgres  (key: postgres_connection_url → langsmith_insights DB)
#   - langsmith-insights-redis     (key: redis_connection_url    → ElastiCache DB index /3)
#
# NOTE: standalone Insights does NOT replace the ClickHouse dependency — ClickHouse
# is still required for the analytics backend. Configure ClickHouse via the existing
# clickhouse_source flow (it adds a clickhouse: block to langsmith-values-insights.yaml
# or the langsmith-clickhouse K8s Secret). The per-feature Postgres + Redis below are
# only for Insights' own operational state (jobs, etc.).
#
# Prerequisites:
#   - chart >= 0.15.0
#   - Insights entitlement in your LangSmith license
#   - postgres_source = "external" and redis_source = "external" in terraform.tfvars
#   - An external ClickHouse reachable from the cluster (see clickhouse_source)
#   - A 'langsmith_insights' database on RDS — created automatically by terraform apply
#   - TF_VAR_langsmith_insights_encryption_key set (see infra/scripts/setup-env.sh)
#     (shared with the legacy enable_insights path — same key, same data)
#
# Enable via: enable_standalone_insights = true in terraform.tfvars
# encryptionKey is injected by init-values.sh into langsmith-values-overrides.yaml.

# NOTE: do not add a `config.insights` block here. Chart 0.15.1+ removed the
# bundled config.insights path and its validator hard-fails on the mere presence
# of the key (hasKey), even when set to false. The standalone top-level `insights`
# block below is the only supported path. (To turn Insights OFF, init-values.sh
# writes a top-level `insights.enabled: false` into langsmith-values-overrides.yaml.)
insights:
  enabled: true
  namePrefix: "standalone-insights"
  # encryptionKey is written by init-values.sh into langsmith-values-overrides.yaml
  # from TF_VAR_langsmith_insights_encryption_key. Do NOT set it here — do not change
  # once data exists.

  # Explicit resources — a strict ResourceQuota rejects any pod without cpu/memory
  # requests and limits (migration issue #7). Sizing mirrors the legacy
  # config.insights.agent.resources defaults (cpu 2/4, memory 4096/8192 MiB).
  apiServer:
    deployment:
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi

  queue:
    deployment:
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi

  postgres:
    external:
      enabled: true
      # Secret created by Terraform (infra/main.tf: kubernetes_secret.standalone_insights_postgres).
      # Contains key: postgres_connection_url = postgresql://<user>:<pass>@<host>:5432/langsmith_insights?sslmode=require
      existingSecretName: "langsmith-insights-postgres"

  redis:
    external:
      enabled: true
      # Secret created by Terraform (infra/main.tf: kubernetes_secret.standalone_insights_redis).
      # Contains key: redis_connection_url = rediss://:<token>@<host>:6379/3
      existingSecretName: "langsmith-insights-redis"
