# Production sizing — multi-replica deployments with HPA autoscaling.
#
# This is the recommended profile for any environment serving real traffic.
# Enables horizontal pod autoscaling on all stateless components with
# reasonable resource requests as starting points. Tune to your workload:
#   kubectl top pods -n langsmith
#
# Covers ALL chart components including infrastructure (ClickHouse, operator,
# agent-builder servers) — not just the application pods.

# -- Application components ----------------------------------------------------

platformBackend:
  deployment:
    resources:
      requests:
        cpu: "500m"
        memory: "1Gi"
      limits:
        cpu: "1"
        memory: "2Gi"
  autoscaling:
    hpa:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 50
      targetMemoryUtilizationPercentage: 80

