# Polly — standalone path (chart v0.15+).
#
# Uses the top-level polly.enabled (standalone) path rather than
# config.polly.enabled (legacy). Does NOT require enable_deployments = true.
# Do not combine with langsmith-values-polly.yaml (legacy config.polly path).
#
# This file is auto-generated by init-values.sh when enable_standalone_polly = true
# in terraform.tfvars. External postgres and redis are wired to the existing RDS and
# ElastiCache instances provisioned by the infra pass, via K8s Secrets created by
# Terraform (infra/main.tf):
#   - langsmith-polly-postgres  (key: postgres_connection_url → langsmith_polly DB)
#   - langsmith-polly-redis     (key: redis_connection_url    → ElastiCache DB index /2)
#
# Prerequisites:
#   - chart >= 0.15.0
#   - Polly entitlement in your LangSmith license
#   - postgres_source = "external" and redis_source = "external" in terraform.tfvars
#   - A 'langsmith_polly' database on RDS — created automatically by terraform apply
#   - TF_VAR_langsmith_polly_encryption_key set (see infra/scripts/setup-env.sh)
#     (shared with the legacy enable_polly path — same key, same data)
#
# Enable via: enable_standalone_polly = true in terraform.tfvars
# encryptionKey is injected by init-values.sh into langsmith-values-overrides.yaml.

# NOTE: do not add a `config.polly` block here. Chart 0.15.1+ removed the bundled
# config.polly path and its validator hard-fails on the mere presence of the key
# (hasKey), even when set to false. The standalone top-level `polly` block below
# is the only supported path. (To turn Polly OFF, init-values.sh writes a
# top-level `polly.enabled: false` into langsmith-values-overrides.yaml.)
polly:
  enabled: true
  namePrefix: "standalone-polly"
  # enableTracing defaults to true in v0.15 — Polly traces back to LangSmith.
  # Set false if you do not want Polly (the eval engine) tracing into itself.
  enableTracing: true
  # encryptionKey is written by init-values.sh into langsmith-values-overrides.yaml
  # from TF_VAR_langsmith_polly_encryption_key. Do NOT set it here — do not change
  # once data exists.

  # Explicit resources — a strict ResourceQuota rejects any pod without cpu/memory
  # requests and limits (migration issue #7). Sizing mirrors the legacy
  # config.polly.agent.resources defaults (cpu 2/4, memory 4096/8192 MiB).
  apiServer:
    deployment:
      resources:
        requests:
          cpu: "2"
          memory: 4Gi
        limits:
          cpu: "4"
          memory: 8Gi

  queue:
    deployment:
      resources:
        requests:
          cpu: "1"
          memory: 2Gi
        limits:
          cpu: "2"
          memory: 4Gi

  postgres:
    external:
      enabled: true
      # Secret created by Terraform (infra/main.tf: kubernetes_secret.standalone_polly_postgres).
      # Contains key: postgres_connection_url = postgresql://<user>:<pass>@<host>:5432/langsmith_polly?sslmode=require
      existingSecretName: "langsmith-polly-postgres"

  redis:
    external:
      enabled: true
      # Secret created by Terraform (infra/main.tf: kubernetes_secret.standalone_polly_redis).
      # Contains key: redis_connection_url = rediss://:<token>@<host>:6379/2
      existingSecretName: "langsmith-polly-redis"
