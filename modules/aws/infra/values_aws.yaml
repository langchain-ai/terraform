# =============================================================================
# LangSmith Helm Values — AWS Reference Template
# =============================================================================
#
# This is a REFERENCE FILE showing all the Helm values you need to configure
# for LangSmith on AWS. It is NOT used directly by the deploy scripts.
#
# The actual deployment uses a layered values system in aws/helm/values/:
#   1. langsmith-values.yaml          — base AWS config (copy from .example)
#   2. langsmith-values-{env}.yaml    — env-specific overrides (auto-generated)
#   3. langsmith-values-*.yaml        — optional addon overlays
#
# If you use the automated deploy path (recommended):
#   1. Run `terraform apply` first (provisions all infrastructure)
#   2. Run `./helm/scripts/init-overrides.sh` (generates values from TF outputs)
#   3. Run `./helm/scripts/deploy.sh` (deploys the Helm chart)
#   → Most of the values below are filled in automatically.
#
# If you're assembling values manually (e.g. custom Helm workflow), use this
# file as a checklist. Every <placeholder> must be replaced.
#
# To retrieve values after `terraform apply`:
#   terraform output -json                      # all outputs
#   terraform output -raw bucket_name           # specific output
#   terraform output -raw langsmith_irsa_role_arn
#   terraform output -raw alb_dns_name
# =============================================================================

config:
  ## -------------------------------------------------------------------------
  ## Secrets — managed by External Secrets Operator (ESO)
  ## -------------------------------------------------------------------------
  ## Terraform's k8s-bootstrap module installs ESO into the cluster. The deploy
  ## script (deploy.sh) creates a ClusterSecretStore and ExternalSecret that
  ## sync secrets from SSM Parameter Store into a K8s Secret called
  ## "langsmith-config".
  ##
  ## The SSM parameters are created by setup-env.sh:
  ##   /langsmith/{name_prefix}-{environment}/langsmith-license-key
  ##   /langsmith/{name_prefix}-{environment}/langsmith-api-key-salt
  ##   /langsmith/{name_prefix}-{environment}/langsmith-jwt-secret
  ##   /langsmith/{name_prefix}-{environment}/langsmith-admin-password
  ##
  ## The K8s Secret name is always "langsmith-config" — it does NOT vary by
  ## name_prefix or environment.
  existingSecretName: "langsmith-config"

  ## Auth type must be "mixed" — this is required by the LangSmith chart.
  ## "mixed" means both API key auth and basic (email/password) auth are enabled.
  authType: "mixed"

  basicAuth:
    enabled: true
    ## The email address for the initial admin account. This user is created
    ## automatically on first deploy. You'll use this to log into LangSmith.
    initialOrgAdminEmail: "<your-admin-email>"

  ## -------------------------------------------------------------------------
  ## Blob Storage (S3) — stores trace payloads
  ## -------------------------------------------------------------------------
  ## LangSmith writes trace inputs, outputs, and intermediate steps to S3.
  ## The bucket is provisioned by Terraform's storage module.
  blobStorage:
    enabled: true
    engine: "S3"

    ## S3 bucket name — provisioned by Terraform.
    ## Naming pattern: {name_prefix}-{environment}-traces
    ## Example: "acme-prod-traces"
    ##
    ## Get the exact name:
    ##   terraform output -raw bucket_name
    bucketName: "<your-bucket-name>"

    ## S3 regional endpoint URL.
    ## Format: https://s3.{region}.amazonaws.com
    ## Example: https://s3.us-west-2.amazonaws.com
    ##
    ## IMPORTANT: This MUST match the region in your terraform.tfvars.
    ## A wrong region causes S3 to return a 301 redirect, which crashes
    ## the LangSmith backend with an opaque error.
    apiURL: "<https://s3.REGION.amazonaws.com>"

  ## -------------------------------------------------------------------------
  ## Hostname — how users access LangSmith
  ## -------------------------------------------------------------------------
  ## The domain or ALB hostname that resolves to your load balancer.
  ##
  ## If you set langsmith_domain in terraform.tfvars:
  ##   Use that domain (e.g. "langsmith.example.com")
  ##
  ## If you did NOT set a custom domain:
  ##   Use the ALB DNS name from Terraform output:
  ##     terraform output -raw alb_dns_name
  ##   Example: "acme-prod-alb-123456789.us-west-2.elb.amazonaws.com"
  ##
  ## On first deploy, this may not be known yet. The deploy script
  ## auto-discovers it from the ingress and fills it in for you.
  hostname: "<your-hostname>"

  ## Base path — leave empty unless you're serving LangSmith under a subpath
  ## (e.g. "example.com/langsmith"). Most deployments leave this empty.
  basePath: ""

## ---------------------------------------------------------------------------
## External Redis
## ---------------------------------------------------------------------------
## Connects the Helm chart to the ElastiCache Redis provisioned by Terraform.
## The connection URL is stored in a K8s Secret by Terraform's k8s-bootstrap module.
redis:
  external:
    ## Set enabled: true  when redis_source = "external" in terraform.tfvars (recommended).
    ## Set enabled: false when redis_source = "in-cluster" — Helm deploys Redis as a pod.
    enabled: true

    ## K8s Secret containing the Redis connection URL.
    ## This secret is created by Terraform's k8s-bootstrap module (not ESO).
    ## The secret name is always "langsmith-redis" — hardcoded in k8s-bootstrap.
    ##
    ## Contains key "connection_url" with format:
    ##   redis://:{auth_token}@{primary_endpoint}:6379
    existingSecretName: "langsmith-redis"

## ---------------------------------------------------------------------------
## External PostgreSQL (RDS)
## ---------------------------------------------------------------------------
## Connects the Helm chart to the RDS PostgreSQL instance provisioned by Terraform.
## The connection URL is stored in a K8s Secret by Terraform's k8s-bootstrap module.
postgres:
  external:
    ## Set enabled: true  when postgres_source = "external" in terraform.tfvars (recommended).
    ## Set enabled: false when postgres_source = "in-cluster" — Helm deploys Postgres as a pod.
    enabled: true

    ## K8s Secret containing the Postgres connection URL.
    ## This secret is created by Terraform's k8s-bootstrap module (not ESO).
    ## The secret name is always "langsmith-postgres" — hardcoded in k8s-bootstrap.
    ##
    ## Contains key "connection_url" with format:
    ##   postgres://{username}:{password}@{rds_endpoint}:5432/langsmith
    existingSecretName: "langsmith-postgres"

## ---------------------------------------------------------------------------
## IRSA (IAM Roles for Service Accounts)
## ---------------------------------------------------------------------------
## LangSmith pods need AWS IAM permissions to access S3. On EKS, this is done
## via IRSA — each pod's service account is annotated with an IAM role ARN.
##
## IMPORTANT: The LangSmith Helm chart does NOT have a global serviceAccount
## block. You must annotate EACH component's service account individually.
## If you miss one, that component silently fails to access S3.
##
## Get the role ARN:
##   terraform output -raw langsmith_irsa_role_arn
##
## These annotations are auto-generated by init-overrides.sh into the
## langsmith-values-{env}.yaml file. Listed here for reference.
# platformBackend:
#   serviceAccount:
#     annotations:
#       eks.amazonaws.com/role-arn: "<your-irsa-role-arn>"
# backend:
#   serviceAccount:
#     annotations:
#       eks.amazonaws.com/role-arn: "<your-irsa-role-arn>"
# ingestQueue:
#   serviceAccount:
#     annotations:
#       eks.amazonaws.com/role-arn: "<your-irsa-role-arn>"
# queue:
#   serviceAccount:
#     annotations:
#       eks.amazonaws.com/role-arn: "<your-irsa-role-arn>"

## ===========================================================================
## TRAFFIC ROUTING — Pick ONE of the three options below
## ===========================================================================
## Docs: https://docs.langchain.com/langsmith/self-host-ingress
##
## How external traffic reaches LangSmith is controlled by two layers:
##   1. frontend.service  — the Kubernetes Service type and annotations
##   2. gateway / ingress — an optional routing layer in front of the service
##
## When a Gateway or Ingress handles routing, the frontend service should be
## ClusterIP so only the gateway/ingress accepts external traffic.
##
## Choose ONE option below and comment out the others.

## ===========================================================================
## Option 1: Gateway API (recommended for LangSmith v0.12.0+)
## ===========================================================================
## The Kubernetes Gateway API is the successor to Ingress. It provides more
## expressive, role-oriented traffic routing. On AWS, pair this with the
## AWS Gateway API Controller to provision ALBs via Gateway resources.
##
## Prerequisites:
##   - Gateway API CRDs installed in your cluster
##   - AWS Gateway API Controller running (installed by EKS Blueprints or manually)
##   - A Gateway resource already created — the Helm chart creates HTTPRoute
##     resources that attach to it, but does NOT create the Gateway itself.
##
## If you don't already have a Gateway resource, you'll need to create one.
## See: https://gateway-api.sigs.k8s.io/guides/getting-started/
gateway:
  enabled: true
  ## Name and namespace of your existing Gateway resource.
  ## Find it: kubectl get gateways --all-namespaces
  name: "<your-gateway-name>"
  namespace: "<your-gateway-namespace>"
  sectionName: "" # optional: specific listener section name
  annotations: {}
  labels: {}

frontend:
  service:
    type: ClusterIP # gateway handles external traffic — service stays cluster-internal

## ===========================================================================
## Option 2: Ingress (legacy — if your cluster doesn't support Gateway API)
## ===========================================================================
## Ingress still works but is effectively frozen upstream — new Kubernetes
## networking features land in Gateway API. Use this only if Gateway API
## CRDs are not available in your cluster.
##
## To use: set gateway.enabled = false above, then uncomment this block.
# ingress:
#   enabled: true
#   hostname: ""           # your LangSmith domain (same as config.hostname above)
#   subdomain: ""          # optional: serve on a subdomain
#   ingressClassName: ""   # if not set, the default ingress class is used
#   annotations: {}
#   labels: {}
#   tls: []

## ===========================================================================
## Option 3: Bare Service with AWS LB (simplest — no routing layer)
## ===========================================================================
## Skips gateway/ingress entirely. The AWS Load Balancer Controller creates a
## Network Load Balancer (NLB) directly from the frontend Service.
##
## Tradeoffs:
##   + Simplest to set up — no Gateway or Ingress resources needed
##   - No hostname-based routing (can't share the LB with other services)
##   - No path-based routing
##   - TLS termination must happen elsewhere (e.g. at the NLB with ACM)
##
## "internet-facing" makes the LB publicly accessible from the internet.
## Set to "internal" if LangSmith should only be reachable from within the
## VPC or over VPN/peering.
##
## To use: set gateway.enabled = false above, then uncomment this block.
# frontend:
#   service:
#     type: LoadBalancer
#     annotations:
#       service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
