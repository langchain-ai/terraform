# ============================================================================
# ABSOLUTE MINIMUM — NOT FOR ANY REAL WORKLOAD
#
# This profile exists to keep LangSmith alive at the lowest possible cost.
# Single replica, rock-bottom resource requests sized from actual kubectl-top
# measurements on an idle cluster. The goal is to fit everything
# on a single small node (e.g. Standard_D4s_v3 — 4 vCPU, 16 GiB).
#
# WILL break under any meaningful traffic. OOM kills, timeouts, and degraded
# UX are expected and acceptable. Do not file bugs against this profile.
#
# Use cases: cost parking, weekend standby, CI smoke tests, demos with a
# single user clicking around.
#
# For actual dev work: use langsmith-values-sizing-dev.yaml
# For production:      use langsmith-values-sizing-production.yaml
#
# Resource numbers sourced from SIZING.md — Minimum profile.
# Total reserved: 2.9 vCPU / 7.6Gi  |  Limits: 9.7 vCPU / 15.3Gi
# ============================================================================

# -- Application components ----------------------------------------------------

backend:
  e2eTest:
    enabled: false
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "50m"
        memory: "576Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

