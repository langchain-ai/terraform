# Agent Builder — visual agent building UI (requires Deployments).
#
# init-values.sh copies this to ../langsmith-values-agent-builder.yaml when you choose
# a product tier that includes Agent Builder (tier 3+).
# Manual: cp examples/langsmith-values-agent-builder.yaml ../langsmith-values-agent-builder.yaml
#
# Prerequisites:
#   - Agent Builder / LangGraph Platform entitlement in your LangSmith license
#   - Sufficient cluster resources (Agent Builder runs additional workloads)

config:
  agentBuilder:
    enabled: true
    # encryptionKey is pulled from Key Vault → langsmith-config-secret K8s Secret.
    # Key name in the secret: agent_builder_encryption_key
    # This is set during: make k8s-secrets (reads from Key Vault)
    # Do not set it here — it is already in existingSecretName.
    #
    # Agent worker pod resources (applied to operator-managed agent deployments).
    # Chart defaults are 4096/8192 MiB — oversized for dev/POC.
    agent:
      resources:
        cpu: 1
        cpuLimit: 2
        memoryMb: 512
        memoryLimitMb: 1024

backend:
  agentBootstrap:
    # Required: runs the post-install/post-upgrade job that creates the langsmith-agent-builder-config
    # ConfigMap and registers Agent Builder as an LGP deployment. Without this the Agent Builder
    # nav item will not appear in the UI.
    enabled: true

agentBuilderToolServer:
  enabled: true
  deployment:
    labels:
      azure.workload.identity/use: "true"
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

agentBuilderTriggerServer:
  enabled: true
  deployment:
    labels:
      azure.workload.identity/use: "true"
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
