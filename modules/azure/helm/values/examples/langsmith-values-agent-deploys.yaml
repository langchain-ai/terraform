# Deployments (LangGraph Platform) — enables the Deployments UI, listener, and operator.
#
# init-values.sh copies this to ../langsmith-values-agent-deploys.yaml when you choose
# a product tier that includes Deployments (tier 2+).
# Manual: cp examples/langsmith-values-agent-deploys.yaml ../langsmith-values-agent-deploys.yaml

config:
  deployment:
    # Enables the Deployments nav item in the UI. Also requires config.hostname to be
    # set in langsmith-values-overrides.yaml — find the NGINX IP with:
    #   kubectl get svc ingress-nginx-controller -n ingress-nginx \
    #     -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
    enabled: true
    # Set to true if TLS is enabled (tls_certificate_source = "letsencrypt" or "dns01").
    # false = HTTP-only. The operator uses this to build agent deployment endpoint URLs —
    # wrong value keeps deployments in DEPLOYING.
    tlsEnabled: true

# Resource sizing for shared components (backend, frontend, playground, aceBackend)
# is handled by the sizing files (langsmith-values-sizing-{production,dev,minimum}.yaml).
# Do not set replicaCount or resources for those components here — it silently
# overrides HPA/autoscaling settings from the sizing file because this file
# is loaded after them in Helm's values merge order.

hostBackend:
  enabled: true
  deployment:
    labels:
      azure.workload.identity/use: "true"
    resources:
      requests:
        cpu: "500m"
        memory: "512Mi"
      limits:
        cpu: "2"
        memory: "2Gi"
  autoscaling:
    hpa:
      enabled: false

listener:
  enabled: true
  deployment:
    labels:
      azure.workload.identity/use: "true"
    resources:
      requests:
        cpu: "1000m"
        memory: "2Gi"
      limits:
        cpu: "2"
        memory: "4Gi"

operator:
  enabled: true
  deployment:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"
  # Deployment template for operator-spawned agent pods.
  # Azure WI: agent pods run as langsmith-ksa. That ServiceAccount must have the
  # azure.workload.identity/client-id annotation — deploy.sh ensures this after deploy.
  templates:
    deployment: |
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: ${name}
        namespace: ${namespace}
      spec:
        replicas: ${replicas}
        revisionHistoryLimit: 10
        selector:
          matchLabels:
            app: ${name}
        template:
          metadata:
            labels:
              app: ${name}
              azure.workload.identity/use: "true"
          spec:
            enableServiceLinks: false
            serviceAccountName: langsmith-ksa
            containers:
            - name: api-server
              image: ${image}
              ports:
              - name: api-server
                containerPort: 8000
                protocol: TCP
              livenessProbe:
                httpGet:
                  path: /ok
                  port: 8000
                periodSeconds: 15
                timeoutSeconds: 5
                failureThreshold: 6
              readinessProbe:
                httpGet:
                  path: /ok
                  port: 8000
                periodSeconds: 15
                timeoutSeconds: 5
                failureThreshold: 6
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 1000m
                  memory: 1Gi
