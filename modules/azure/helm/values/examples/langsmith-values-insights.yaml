# Insights — ClickHouse-backed analytics (requires external ClickHouse).
#
# init-values.sh generates langsmith-values-insights.yaml based on clickhouse_source:
#   - clickhouse_source = "in-cluster"  → simple config.insights.enabled: true (no external block)
#   - clickhouse_source = "external"    → copies this file (fill in host/port below)
#
# For in-cluster ClickHouse (dev/POC), you do not need this file — init-values.sh
# generates the correct minimal config automatically.
#
# Prerequisites (external ClickHouse):
#   - ClickHouse instance reachable from the AKS cluster
#   - langsmith-clickhouse K8s secret with connection details (see below)
#   - insights_encryption_key in Key Vault (set by setup-env.sh and Terraform)

config:
  insights:
    enabled: true
    # encryptionKey is read from langsmith-config-secret (insights_encryption_key).
    # Do NOT set encryptionKey inline — it is already in the secret via existingSecretName.

clickhouse:
  external:
    enabled: true
    host: ""          # ClickHouse hostname or endpoint
    port: "8123"      # HTTP port (default 8123); use 8443 for HTTPS
    database: "default"
    user: "default"
    # tls: true       # Uncomment if using HTTPS/TLS
    #
    # Store connection credentials in a K8s Secret and reference it.
    # The chart reads each field by its *SecretKey name.
    #
    #   kubectl create secret generic langsmith-clickhouse -n langsmith \
    #     --from-literal=clickhouse_host=<host> \
    #     --from-literal=clickhouse_port=8123 \
    #     --from-literal=clickhouse_user=default \
    #     --from-literal=clickhouse_password=<password> \
    #     --from-literal=clickhouse_db=default \
    #     --from-literal=clickhouse_tls=false
    existingSecretName: "langsmith-clickhouse"
    #
    # Option B: Inline password (not recommended — visible in Helm release metadata):
    # password: ""
