# ============================================================================
# WARNING: NOT FOR PRODUCTION USE
#
# Minimal resource footprint for non-production environments: local dev, CI
# pipelines, integration tests (k3d/kind/EKS dev), demos, and short-lived
# POCs. Single replica per component, no autoscaling, tight limits.
#
# This WILL cause instability under real workloads — OOM kills, slow queries,
# and degraded UX are expected. That's fine; the goal is to fit LangSmith on
# a small cluster, not to serve traffic.
#
# For production: use langsmith-values-sizing-production.yaml
#   (sizing_profile = "production" in terraform.tfvars)
# ============================================================================
#
# Why this exists:
#   Chart defaults request 1+ CPU per component and 3.5 CPU / 12Gi for
#   ClickHouse alone. A base LangSmith install won't schedule on anything
#   smaller than ~12 vCPU without this overlay. For CI or dev clusters
#   running on 2-4 vCPU nodes, you need these reduced requests or pods
#   stay Pending indefinitely.
#
# Covers ALL chart components including infrastructure (ClickHouse, operator,
# agent-builder servers) — not just the application pods.
#
# NOTE: Uses deployment.resources / deployment.replicas nesting to match the
# current LangSmith chart schema (aligned with GCP and Azure values).

# -- Application components ----------------------------------------------------

backend:
  e2eTest:
    enabled: false
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1Gi"

frontend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

platformBackend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

playground:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "384Mi"

queue:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "500m"
        memory: "1Gi"

ingestQueue:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

aceBackend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# -- Deployments feature components --------------------------------------------

hostBackend:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

listener:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "2Gi"

operator:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# -- Agent Builder infrastructure ----------------------------------------------
# These run alongside the operator-managed agent pods (which we can't size here).

agentBuilderToolServer:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

agentBuilderTriggerServer:
  deployment:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        cpu: "500m"
        memory: "512Mi"

# -- In-cluster data services (Tier 1 only) -----------------------------------
# These apply when using in-cluster postgres, redis, and clickhouse.
# If you're pointing at managed services (RDS, ElastiCache, ClickHouse Cloud),
# these blocks are ignored — the StatefulSets won't be created.
#
# Chart default for ClickHouse is 3.5 CPU / 12Gi — wildly oversized for dev.

postgres:
  statefulSet:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "1"
        memory: "512Mi"

redis:
  statefulSet:
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
      limits:
        cpu: "500m"
        memory: "256Mi"

clickhouse:
  statefulSet:
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1"
        memory: "1.5Gi"
