# Fleet — v0.15 standalone counterpart to Agent Builder (chart v0.15+).
#
# Uses the top-level fleet.enabled (standalone) path.
# REQUIRES enable_deployments = true: the Fleet chat UI resolves OAuth provider/
# token connections via host-backend, which is only deployed with Deployments.
# Without it the UI 500s on /v1/platform/fleet/providers/.../connection.
# Do not combine with langsmith-values-agent-builder.yaml (legacy config.agentBuilder path).
#
# This file is auto-generated by init-values.sh when enable_fleet = true in
# terraform.tfvars. Fleet's Postgres is wired to a dedicated database on the
# existing Azure PostgreSQL Flexible Server, via a K8s Secret created by Terraform
# (infra/modules/k8s-bootstrap):
#   - langsmith-fleet-postgres  (key: postgres_connection_url → langsmith_fleet DB)
#
# Redis: Fleet uses the chart's IN-CLUSTER bundled Redis StatefulSet
# (<release>-standalone-fleet-redis). Azure Managed Redis is a single-DB OSS
# cluster (SELECT blocked on every SKU), so it can't provide the logical-DB
# isolation the AWS/GCP Fleet uses, and Fleet has no clusterSafeMode knob to make
# a cluster endpoint safe. The bundled pod avoids CROSSSLOT with no config fix.
# See helm/values/examples/ notes or the fleet-redis explainer for the full rationale.
#
# Prerequisites:
#   - chart >= 0.15.0
#   - Agent Builder / Fleet entitlement in your LangSmith license
#   - enable_deployments = true (host-backend serves Fleet's OAuth provider/token endpoints)
#   - postgres_source = "external" in terraform.tfvars
#   - A 'langsmith_fleet' database — created automatically by terraform apply
#   - TF_VAR_langsmith_agent_builder_encryption_key set (see infra/scripts/setup-env.sh)
#     (shared with the legacy enable_agent_builder path — same key, same data)
#
# Enable via: enable_fleet = true in terraform.tfvars

# Disables the legacy config.agentBuilder path — overrides langsmith-values-agent-builder.yaml
# if both files are loaded in the same helm command.
config:
  agentBuilder:
    enabled: false

fleet:
  enabled: true
  namePrefix: "standalone-fleet"
  # encryptionKey is read from langsmith-config-secret (key: agent_builder_encryption_key),
  # materialized by infra/scripts/create-k8s-secrets.sh from Key Vault and referenced via
  # config.existingSecretName. The chart injects it as AGENT_BUILDER_ENCRYPTION_KEY when
  # fleet.enabled. Do NOT set it inline — do not change once data exists.
  # encryptionKey: ""

  postgres:
    external:
      enabled: true
      # Secret created by Terraform (infra/modules/k8s-bootstrap: kubernetes_secret_v1.fleet_postgres).
      # Contains key: postgres_connection_url = postgresql://<user>:<pass>@<host>:5432/langsmith_fleet?sslmode=require
      existingSecretName: "langsmith-fleet-postgres"

  # redis: intentionally omitted → the chart deploys its own in-cluster Fleet Redis
  # StatefulSet (<release>-standalone-fleet-redis). See the header note above.
  # The langsmith-defaults LimitRange (infra/modules/k8s-bootstrap) supplies the
  # cpu/memory the bundled Redis/Postgres StatefulSets need to satisfy the ResourceQuota.

# fleetToolServer / fleetTriggerServer are separate top-level Deployments. Chart
# v0.15 renamed them from agentBuilderToolServer / agentBuilderTriggerServer.
# Both default to enabled: true. Workload Identity serviceAccount.annotations are
# injected by init-values.sh into values-overrides.yaml (Helm merges them here).
fleetToolServer:
  enabled: true
  # Migration issue #13: the 0.15.x fleet-tool-server image CPU-pegs on startup
  # (LANGGRAPH_DEPLOYMENT_URL sync/poll loop) and can't bind port 1989 within the
  # chart's default startup-probe window (6 × 10s = 60s), so it CrashLoopBackOffs.
  # Fix = a longer startup window (below: 30 × 5s = 150s); CPU settles to < 20m
  # once it's up. No resources override: the chart already sizes this container at
  # 2 CPU / 4Gi (limits), which is adequate, and the namespace langsmith-defaults
  # LimitRange only sets `default`/`defaultRequest` (applied to containers that
  # declare no limits) — it has no `max`, so it never reduces a chart-sized pod.
  deployment:
    startupProbe:
      httpGet:
        path: /health
        port: 1989
      failureThreshold: 30
      periodSeconds: 5
      timeoutSeconds: 5

fleetTriggerServer:
  # Currently only supports a single replica (chart-enforced) to prevent duplicate
  # trigger executions — do not set a replica count here.
  enabled: true
