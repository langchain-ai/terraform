# Production Large sizing — high-volume deployments with elevated baselines.
#
# Based on the High/High pattern from the LangSmith scale guide:
#   https://docs.langchain.com/langsmith/self-host-scale
#   ~50 concurrent users, ~1000 traces/sec
#
# Use this when you know the deployment will handle heavy ingest volume or
# a large number of concurrent users from day one. For most production
# deployments, start with sizing_profile = "production" and scale up if
# monitoring shows sustained pressure.
#
# Covers ALL chart components including infrastructure (ClickHouse, operator,
# agent-builder servers) — not just the application pods.
#
# Monitor actual usage with:
#   kubectl top pods -n langsmith

# -- Application components ----------------------------------------------------

backend:
  deployment:
    resources:
      requests:
        cpu: "1"
        memory: "2Gi"
      limits:
        cpu: "4"
        memory: "8Gi"
  autoscaling:
    hpa:
      enabled: true
      minReplicas: 10
      maxReplicas: 50
      targetCPUUtilizationPercentage: 50
      targetMemoryUtilizationPercentage: 80

