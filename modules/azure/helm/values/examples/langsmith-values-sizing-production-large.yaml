# -- In-cluster ClickHouse (dev/POC only — production should use external) -----
# High/High pattern: 14+ CPU / 24+ Gi per node, 3-node cluster recommended.
# In-cluster ClickHouse is a single StatefulSet pod — it cannot do 3-node.
# If you're at this scale, you should be using LangChain Managed ClickHouse.
# These limits are set high to squeeze maximum performance from a single pod.

clickhouse:
  statefulSet:
    resources:
      requests:
        cpu: "4"
        memory: "16Gi"
      limits:
        cpu: "8"
        memory: "32Gi"
