# Let's Encrypt ClusterIssuers for cert-manager
#
# Apply after cert-manager is ready (helm_release.cert_manager in Terraform):
#   ACME_EMAIL=you@example.com bash helm/scripts/apply-cluster-issuers.sh
#
# Or apply directly (replace ACME_EMAIL first):
#   sed 's/ACME_EMAIL_PLACEHOLDER/you@example.com/g' helm/values/use-cases/letsencrypt/letsencrypt-issuers.yaml | kubectl apply -f -
#
# Both staging and prod issuers are created:
#   - letsencrypt-staging: test without rate limits (cert NOT trusted by browsers)
#   - letsencrypt-prod: production (trusted, rate-limited to 5 certs/domain/week)
#
# values-overrides.yaml uses: cert-manager.io/cluster-issuer: "letsencrypt-prod"
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: ACME_EMAIL_PLACEHOLDER
    privateKeySecretRef:
      name: letsencrypt-staging
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: ACME_EMAIL_PLACEHOLDER
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            ingressClassName: nginx
